<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>See you soon · minimal maintenance</title>
  <!-- Google Fonts: only Inter, modern & clean -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background-color: #fafbfc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      color: #1a2c3e;
      line-height: 1.5;
    }

    /* ultra-clean container — no shadows, no blur, just airy spacing */
    .card {
      max-width: 560px;
      width: 100%;
      background: #ffffff;
      border-radius: 2rem;
      padding: 3rem 2rem;
      text-align: center;
      transition: all 0.2s ease;
    }

    /* simple visual element: thin separator line or minimal icon placeholder */
    .symbol {
      margin-bottom: 1.75rem;
      font-size: 3rem;
      font-weight: 300;
      letter-spacing: -0.02em;
      color: #9aaebf;
      line-height: 1;
    }

    /* modern headline: clean weight, tight spacing */
    h1 {
      font-size: 2.2rem;
      font-weight: 550;
      letter-spacing: -0.02em;
      color: #1f3a4b;
      margin-bottom: 1rem;
    }

    /* main message: clear, readable, minimal */
    .message {
      font-size: 1.05rem;
      font-weight: 400;
      color: #4a627a;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
      margin-bottom: 1.5rem;
    }

    /* subtle status chip — minimal border, no heavy background */
    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: transparent;
      border: 1px solid #e2e8f0;
      padding: 0.45rem 1.1rem;
      border-radius: 40px;
      font-size: 0.8rem;
      font-weight: 450;
      color: #4f7ea3;
      margin-top: 0.5rem;
    }

    /* animated ping dot — minimal but gentle */
    .ping {
      width: 6px;
      height: 6px;
      background-color: #6f9fcf;
      border-radius: 50%;
      display: inline-block;
      animation: softPulse 1.8s infinite ease;
    }

    @keyframes softPulse {
      0% { opacity: 0.4; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); background-color: #4f8bc9; }
      100% { opacity: 0.4; transform: scale(0.8); }
    }

    /* simple divider line (minimal) */
    .divider {
      margin: 2rem auto 1.2rem;
      width: 48px;
      height: 1px;
      background: #e2e8f0;
    }

    /* small footnote — minimal, airy */
    .footnote {
      font-size: 0.75rem;
      color: #8ba0b8;
      margin-top: 1.2rem;
      letter-spacing: 0.01em;
    }

    /* optional hover effect on card (very subtle) */
    .card {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    /* responsive: perfect on mobile */
    @media (max-width: 550px) {
      body {
        padding: 1.2rem;
      }
      .card {
        padding: 2rem 1.5rem;
        border-radius: 1.5rem;
      }
      h1 {
        font-size: 1.8rem;
      }
      .message {
        font-size: 0.95rem;
      }
      .symbol {
        font-size: 2.4rem;
      }
    }

    /* no extra icons, no bloat — pure minimalism */
    /* ensure focus on text & breathing space */
    .status span:last-child {
      font-weight: 450;
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- minimalist symbol instead of heavy icon: just a gentle tilde / wave -->
    <div class="symbol">✦</div>
    
    <h1>See you soon</h1>
    
    <div class="message">
      We're making a few quiet improvements.<br>
      The site will be back in a moment.
    </div>
    
    <div class="status">
      <span class="ping"></span>
      <span>under gentle maintenance</span>
    </div>
    
    <div class="divider"></div>
    
    <div class="footnote">
      thanks for your patience
    </div>
  </div>
</body>
</html>
